name: Bug Report
description: Something doesn't work as expected
title: '[Bug]: '
labels: ['bug']

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What you did, what you expected, what you got.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Plugin config
      render: typescript
      placeholder: |
        pluginScalar({
          instances: [
            { route: '/scalar', configuration: { url: '/openapi.json' } },
          ],
        })
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions
      description: '`@seshuk/rspress-plugin-scalar`, `@rspress/core`, `react`, `node`'
      placeholder: 'plugin 0.1.0, rspress 2.0.11, react 19, node 22'
    validations:
      required: true

  - type: input
    id: repro
    attributes:
      label: Reproduction (optional)
      placeholder: https://github.com/...
